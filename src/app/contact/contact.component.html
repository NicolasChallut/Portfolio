<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBBMd6_uVLV_Kg5KnUsfCANVcwetaIwa-0"></script>

<google-map [center]="center" [zoom]="zoom" style="height: 400px; width: 100%; margin-top: 20px;"></google-map>

<div class="contact">
  <div class="info-container">
    <div class="info-block">
      <i class="material-icons location">location_on</i>
      <h3>Passy</h3>
      <p>Marlioz / Haute-Savoie</p>
    </div>

    <div class="info-block">
      <i class="material-icons work">home_work</i>
      <h3>Travail</h3>
      <p>En présentiel ou en télétravail/Hybride</p>
    </div>

    <div class="info-block">
      <i class="material-icons check">check_circle</i>
      <h3>Disponible</h3>
      <p>À la recherche d'un emploi</p>
    </div>
  </div>

  <div class="contact-form-container">
    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Nom</label>
        <input id="name" formControlName="name" type="text" />
        <div *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched" class="error-message">
          Le nom est obligatoire.
        </div>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" formControlName="email" type="email" />
        <div *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched" class="error-message">
          Entrez une adresse email valide.
        </div>
      </div>
      
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" formControlName="message" rows="5"></textarea>
        <div *ngIf="contactForm.get('message')?.invalid && contactForm.get('message')?.touched" class="error-message">
          Le message doit comporter au moins 10 caractères.
        </div>
      </div>
      
      <button type="submit" [disabled]="contactForm.invalid">Envoyer</button>
    </form>
  </div>
</div>
